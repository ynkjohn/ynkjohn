name: Update profile status

on:
  schedule:
    - cron: '13 12 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'scripts/update-profile.mjs'
      - '.github/workflows/update-profile.yml'

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch GitHub profile data
        run: node scripts/update-profile.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_OWNER: ${{ github.repository_owner }}

      - name: Commit updated status
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/profile-status.svg
          git commit -m 'chore(profile): update status'
          git push
